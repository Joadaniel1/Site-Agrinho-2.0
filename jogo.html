<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mini Game Agrinho</title>

<style>

body{

margin:0;
overflow:hidden;

font-family:Arial, sans-serif;

background:
linear-gradient(135deg,#1b5e20,#4caf50);

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

.game-container{

background:white;

width:90%;
max-width:900px;

padding:30px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

text-align:center;

}

h1{

color:#1b5e20;

}

.info{

display:flex;
justify-content:center;
gap:40px;

font-size:22px;

margin-bottom:20px;

}

.game-area{

position:relative;

width:100%;
height:500px;

background:#e8f5e9;

border-radius:20px;

overflow:hidden;

}

.item{

position:absolute;

font-size:50px;

cursor:pointer;

transition:0.2s;

user-select:none;

}

.item:hover{

transform:scale(1.2);

}

.start-btn{

margin-top:20px;

padding:15px 30px;

border:none;

border-radius:12px;

background:#2e7d32;

color:white;

font-size:18px;

cursor:pointer;

transition:0.3s;

}

.start-btn:hover{

background:#1b5e20;

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="game-container">

<h1>🎮 Salve o Meio Ambiente</h1>

<div class="info">

<p>
⭐ Pontos:
<span id="score">0</span>
</p>

<p>
⏳ Tempo:
<span id="time">30</span>s
</p>

</div>

<div class="game-area" id="gameArea">

</div>

<button class="start-btn"
onclick="startGame()">

▶ Iniciar Jogo

</button>

</div>

<script>

const gameArea =
document.getElementById("gameArea");

const scoreText =
document.getElementById("score");

const timeText =
document.getElementById("time");

let score = 0;
let time = 30;

let running = false;

function startGame(){

if(running) return;

running = true;

score = 0;
time = 30;

scoreText.innerHTML = score;
timeText.innerHTML = time;

const timer = setInterval(()=>{

time--;

timeText.innerHTML = time;

if(time <= 0){

clearInterval(timer);

running = false;

alert(
"🎉 Fim de jogo! Você fez "
+ score +
" pontos!"
);

}

},1000);

spawnItem();

}

function spawnItem(){

if(!running) return;

const item =
document.createElement("div");

const good =
Math.random() > 0.3;

item.classList.add("item");

item.innerHTML =
good ? "🌳" : "🗑️";

item.style.left =
Math.random()*90 + "%";

item.style.top =
Math.random()*80 + "%";

item.onclick = ()=>{

if(good){

score++;

}else{

score--;

}

scoreText.innerHTML = score;

item.remove();

};

gameArea.appendChild(item);

setTimeout(()=>{

item.remove();

},2000);

setTimeout(spawnItem,800);

}

</script>

</body>

</html>
